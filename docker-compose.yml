services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: md2pdf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-setup:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/md2pdf;
      /usr/bin/mc anonymous set download local/md2pdf;
      exit 0;
      "

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/md2pdf?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_BASE_URL: http://localhost:9000/md2pdf
      APP_URL: http://localhost:3000
      AUTH_COOKIE_SECRET: development-secret-change-me
      NEXT_IGNORE_INCORRECT_LOCKFILE: "1"
    depends_on:
      - postgres
      - redis
      - minio
      - minio-setup
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/md2pdf?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_BASE_URL: http://minio:9000/md2pdf
      APP_URL: http://web:3000
      AUTH_COOKIE_SECRET: development-secret-change-me
    depends_on:
      - postgres
      - redis
      - minio
      - minio-setup

volumes:
  postgres-data:
  redis-data:
  minio-data:

